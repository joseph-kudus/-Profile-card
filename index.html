<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profile Card Project Extension</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="profile-card">
      <div class="profile-image">
        <img src="/images/20250821_160921.jpg" alt="" />
      </div>
      <div class="my-des">
        <h2 class="user-name">Joseph Lukudu</h2>
        <p class="job-title">Aspiring Developer (Fullstack)</p>
      </div>
      <div class="bio">
        <p>
          Hi, my name is Joseph, I am learning web development and building
          projects step by step.
        </p>
      </div>
      <div class="hobbies">
        <h4>HOBBIES</h4>
        <div class="hobbi">
          <button>Coding</button>
          <button>Reading</button>
          <button>Basket ball</button>
        </div>
        <div class="social-links">
          <button><a href="https://github.com/joseph-kudus">Github</a></button>
          <button><a href="#" target="_top">Linkedin</a></button>
          <button><a href="#" target="_parent">FaceBook</a></button>
        </div>
      </div>
      <div class="skills-section">
        <div class="skill-list">
          <h3>Skills section</h3>
          <ol>
            <li>
              <div class="skill-wraper">
                <div class="skill-contaiiner">
                  <div class="skillname">HTML</div>
                  <div class="meter">
                    <span style="width: 80%"
                      ><span class="skillLevel">80%</span></span
                    >
                  </div>
                </div>
              </div>
            </li>
            <li>
              <div class="skill-wraper">
                <div class="skill-contaiiner">
                  <div class="skillname">CSS</div>
                  <div class="meter">
                    <span style="width: 70%"
                      ><span class="skillLevel">70%</span></span
                    >
                  </div>
                </div>
              </div>
            </li>
            <li>
              <div class="skill-wraper">
                <div class="skill-contaiiner">
                  <div class="skillname">JavaScript</div>
                  <div class="meter">
                    <span style="width: 60%"
                      ><span class="skillLevel">60%</span></span
                    >
                  </div>
                </div>
              </div>
            </li>
            <li>
              <div class="skill-wraper">
                <div class="skill-contaiiner">
                  <div class="skillname">React</div>
                  <div class="meter">
                    <span style="width: 50%"
                      ><span class="skillLevel">50%</span></span
                    >
                  </div>
                </div>
              </div>
            </li>
          </ol>
        </div>
      </div>
    </div>
  </body>
</html>
