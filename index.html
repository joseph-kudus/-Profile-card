<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Joseph Lukudu - Profile Card</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
  <div class="profile-card">
    <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode">
      <i class="fas fa-moon"></i>
    </button>

    <div class="profile-image">
      <img src="assets/me.jpg" alt="Joseph Lukudu" />
    </div>

    <div class="my-des">
      <h2 class="user-name">Joseph Lukudu</h2>
      <p class="job-title">Aspiring Fullstack Developer</p>
    </div>

    <div class="bio">
      <p>
        Hi, my name is Joseph. I'm learning web development and building
        projects step by step. Currently focused on React and JavaScript.
      </p>
    </div>

    <div class="hobbies">
      <h4>HOBBIES</h4>
      <div class="hobbi">
        <span class="hobby-pill">Coding</span>
        <span class="hobby-pill">Reading</span>
        <span class="hobby-pill">Basketball</span>
      </div>
    </div>


    <!-- REQUIREMENT 2: Projects Section with Filters -->
    <div class="projects-section">
      <h4>PROJECTS I'VE BUILT</h4>
    
      <div class="project-filters">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="Pure HTML & CSS">HTML & CSS</button>
        <button class="filter-btn" data-filter="HTML CSS & JS">HTML CSS & JS</button>
        <button class="filter-btn" data-filter="React">React</button>
      </div>
    
      <div id="projectsList">
        <!-- Projects injected by JS -->
      </div>
    </div>
    <!-- BONUS -->
    <div class="hire-me-wrapper">
      <button id="hireMeBtn" class="hire-me-btn">
        <i class="fa-solid fa-hand"></i> Say Hello
      </button>
      <div id="hireMeText" class="hire-me-text">
        <p>Hey, I'm available for work!</p>
        <a href="https://wa.me/256773409907?text=Hi%20Joseph,%20I%20saw%20your%20profile!" target="_blank"
          class="hire-me-cta">
          <i class="fab fa-whatsapp"></i> WhatsApp Me
        </a>
      </div>
    </div>

    <div class="social-links">
      <a href="https://github.com/joseph-kudus" target="_blank" aria-label="GitHub"><i class="fab fa-github"></i></a>
      <a href="https://linkedin.com/in/yourprofile" target="_blank" aria-label="LinkedIn"><i
          class="fab fa-linkedin"></i></a>
      <a href="mailto:josephlukudu22@gmail.com" aria-label="Email"><i class="fas fa-envelope"></i></a>
    </div>
  </div>

  <script src="projects.js"></script>
</body>

</html>
