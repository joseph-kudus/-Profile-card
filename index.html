<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profile Card Project Extension</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="profile-card">
      <div class="profile-image">
        <img src="/images/20250821_160921.jpg" alt="" />
      </div>
      <div class="my-des">
        <h2 class="user-name">Joseph Lukudu</h2>
        <p class="job-title">Web Developer (Fullstack)</p>
      </div>
      <div class="bio">
        <p>
          Hi, my name is Joseph, I am learning web development and building
          projects step by step.
        </p>
      </div>
      <div class="hobbies">
        <h4>HOBBIES</h4>
        <div class="hobbi">
          <button>Coding</button>
          <button>Reading</button>
          <button>Basket ball</button>
        </div>
        <div class="social-links">
          <button><a href="https://github.com/joseph-kudus">Github</a></button>
          <button><a href="#">Linkedin</a></button>
          <button><a href="#">FaceBook</a></button>
        </div>
      </div>
    </div>
  </body>
</html>
